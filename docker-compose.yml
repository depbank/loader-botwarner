version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - bot_data:/app/temp
      - bot_data:/app/downloads
      - bot_data:/app/logs
      - bot_data:/app/database
    environment:
      - REDIS_ENABLED=true
      - REDIS_URL=redis://redis:6379/0

volumes:
  redis_data:
  bot_data:
