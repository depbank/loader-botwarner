name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff py_compile
      - name: Check .env not committed
        run: |
          if [ -f .env ]; then
            echo "❌ .env file found in repo! Remove it!"
            exit 1
          fi
          echo "✅ No .env in repo"
      - name: Syntax check
        run: |
          find . -name "*.py" -not -path "./.github/*" -not -path "./__pycache__/*" -exec python -m py_compile {} \;
      - name: Lint with Ruff
        run: ruff check --ignore E501,F811,E402 .

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -r requirements.txt
      - name: Security audit
        run: pip-audit --desc=on
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: [lint, security]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t depbank-bot .
